<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>リダイレクト中... - 校異源氏物語テキストDB</title>
    <script>
        (function() {
            var path = window.location.pathname;
            var search = window.location.search;

            // /xml/xsl/NN.xml → /html/NN.html (preserve query params)
            var m = path.match(/^\/xml\/xsl\/(\d+)\.xml$/);
            if (m) {
                var newUrl = '/html/' + m[1] + '.html' + search;
                window.location.replace(newUrl);
                return;
            }

            // /xml/lw/NN.xml → /tei/NN.xml (preserve query params)
            m = path.match(/^\/xml\/lw\/(\d+)\.xml$/);
            if (m) {
                var newUrl = '/tei/' + m[1] + '.xml' + search;
                window.location.replace(newUrl);
                return;
            }

            // If no redirect matched, show 404
            var lang = localStorage.getItem('language') || (navigator.language || '').substring(0, 2);
            document.getElementById('content').style.display = 'block';
            if (lang === 'en') {
                document.documentElement.lang = 'en';
                document.getElementById('content-ja').style.display = 'none';
                document.getElementById('content-en').style.display = 'block';
            }
        })();
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 3rem; color: #333; }
        h1 { font-size: 2rem; color: #5b3a1a; }
        a { color: #8b4513; }
    </style>
</head>
<body>
    <div id="content" style="display:none">
        <div id="content-ja">
            <h1>404 - ページが見つかりません</h1>
            <p>お探しのページは存在しないか、移動した可能性があります。</p>
            <p><a href="/">トップページへ戻る</a></p>
        </div>
        <div id="content-en" style="display:none">
            <h1>404 - Page Not Found</h1>
            <p>The requested page does not exist. It may have been relocated or removed.</p>
            <p><a href="/index-en.html">Return to Home</a></p>
        </div>
    </div>
</body>
</html>
