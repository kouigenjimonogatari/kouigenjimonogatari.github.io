name: Build and Deploy

on:
  push:
    branches: [master]
    paths:
      - 'xml/master/**'
      - 'scripts/**'
      - 'docs/**'
      - 'data/**'
      - 'requirements.txt'
      - 'package.json'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download Saxon-HE
        run: |
          curl -sL -o /tmp/saxon-he.jar \
            https://repo1.maven.org/maven2/net/sf/saxon/Saxon-HE/12.5/Saxon-HE-12.5.jar

      - name: Run prebuild (tei, xsl, waka, stats)
        env:
          SAXON_JAR: /tmp/saxon-he.jar
        run: python3 scripts/prebuild.py tei xsl waka stats epub

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
